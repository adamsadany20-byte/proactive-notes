<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolve Notes</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#e7ddc9" />
    <!-- Editorial display serif (headings, brand, streak numerals). Body stays Inter. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&display=swap"
      rel="stylesheet"
    />
    <!-- iOS home-screen (PWA) support — required for closed-app push on iPhone.
         Must be a square PNG with an opaque background: iOS ignores SVG here and
         fills transparency with black, and squashes non-square art. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Evolve" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  </head>
  <body>
    <!-- Apply the saved design theme before first paint so there's no flash. -->
    <script>
      try {
        var t = localStorage.getItem('evolve.theme');
        if (t === 'earthy') document.documentElement.dataset.theme = 'earthy';
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
