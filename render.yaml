# Render blueprint — deploys the whole app (API + built frontend) as ONE free
# web service. On https://render.com: New → Blueprint → point at this repo.
# Only ANTHROPIC_API_KEY needs filling in; everything else has safe defaults.
services:
  - type: web
    name: proactive-notes
    runtime: node
    plan: free
    # VITE_API_BASE="" makes the frontend call the API on its own origin.
    buildCommand: VITE_API_BASE="" npm install && npm run build
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # paste your key in the Render dashboard
      # Haiku builds tools (cheap/fast); Sonnet answers world-knowledge lookups.
      - key: AI_MODEL_CODE
        value: claude-haiku-4-5
      - key: AI_MODEL_KNOWLEDGE
        value: claude-sonnet-5
      - key: WEB_SEARCH
        value: "true"
      # Supabase (optional: accounts + sync). Get from Supabase → Settings → API.
      # Leave blank for local-only mode (no login, no cross-device sync).
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # Server-side token verification (Supabase → Settings → API → JWT Secret).
      # Required before enabling live billing so user ids can't be forged.
      - key: SUPABASE_JWT_SECRET
        sync: false
      # Service-role key (Supabase → Settings → API → service_role). Lets the
      # server persist paid credit in the `entitlements` table so it survives
      # redeploys. Required before live billing. NEVER expose it to the browser.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Free mode: nothing is gated, no Stripe needed. Flip to "true" (and add
      # STRIPE_SECRET_KEY + STRIPE_WEBHOOK_SECRET) only when you want to charge.
      - key: BILLING_ENABLED
        value: "false"
      # After the first deploy, set this to your public URL, e.g.
      # https://proactive-notes.onrender.com (used for Stripe/OAuth redirects).
      - key: APP_ORIGIN
        sync: false
      # --- Web Push (closed-app reminder notifications) ---------------------
      # Generate ONE stable VAPID key pair and paste both here (never change them
      # after users subscribe, or their subscriptions break):
      #   node -e "console.log(JSON.stringify(require('web-push').generateVAPIDKeys()))"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      # Contact URI sent with each push (a mailto: is fine).
      - key: VAPID_SUBJECT
        value: mailto:notify@evolve.app
      # Shared secret so only your cron pinger can trigger reminder sends. Set a
      # random value, then have cron-job.org POST to
      # https://YOUR-URL/api/cron/tick?secret=THIS every 2–3 minutes.
      - key: CRON_SECRET
        sync: false
